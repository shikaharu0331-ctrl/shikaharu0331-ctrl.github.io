<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image.prod.js"></script>
</head>

<body>

<!-- スタートボタン -->
<button id="startButton"
  style="
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
    font-size:20px;
    padding:10px;
  ">
  ARを開始する
</button>

<a-scene
  id="scene"
  style="display:none;"
  mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  renderer="alpha: true; colorManagement: true"
  embedded
>

  <a-assets timeout="10000">
    <img id="photo" src="photo.jpg">
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  
  <a-entity mindar-image-target="targetIndex: 0">
    <a-image src="#photo" position="0 0 0" height="1" width="1"></a-image>
    <a-text value="ありがとう！" position="0 1 0" align="center"></a-text>
  </a-entity>

</a-scene>

<script>
document.querySelector("#startButton").addEventListener("click", async () => {
  const scene = document.querySelector("#scene");

  // iPhone用：カメラ許可を明示的に要求
  try {
    await navigator.mediaDevices.getUserMedia({ video: true });
  } catch (e) {
    alert("カメラの許可が必要です");
    return;
  }

  scene.style.display = "block";

  // AR開始
  await scene.systems["mindar-image-system"].start();

  document.querySelector("#startButton").style.display = "none";
});
</script>

</body>
</html>
